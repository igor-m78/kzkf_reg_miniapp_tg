    function setError(el, text) {
      if (!el) return;
      el.style.display = text ? 'block' : 'none';
      el.textContent = text || '';
    }

    function showFormMessage(text) {
      formMsg.textContent = text || '';
      formMsg.className = text ? 'ft-message error' : 'ft-message';
      formMsg.style.display = text ? 'block' : 'none';
    }

    function normalizePhone(raw) {
      let s = (raw || '').trim().replace(/[^\d+]/g, '');
      if (/^8\d{10}$/.test(s)) s = '+7' + s.slice(1);
      if (/^7\d{10}$/.test(s)) s = '+7' + s;
      return s;
    }

    function isValidPhone(s) {
      return /^\+7\d{10}$/.test(s);
    }

    function isValidEmail(s) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test((s || '').trim());
    }

    function normalizeText(s) {
      return (s || '')
        .toLowerCase()
        .replace(/ё/g, 'е')
        .replace(/[^\p{L}\p{N}\s\-\(\)\.]/gu, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cur = '';
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        if (inQuotes) {
          if (ch === '"') {
            if (text[i + 1] === '"') {
              cur += '"';
              i++;
            } else {
              inQuotes = false;
            }
          } else {
            cur += ch;
          }
        } else {
          if (ch === '"') inQuotes = true;
          else if (ch === ',') {
            row.push(cur);
            cur = '';
          } else if (ch === '\n') {
            row.push(cur);
            rows.push(row);
            row = [];
            cur = '';
          } else if (ch !== '\r') {
            cur += ch;
          }
        }
      }

      if (cur.length || row.length) {
        row.push(cur);
        rows.push(row);
      }

      return rows;
    }

    function findColIndex(headers, variants) {
      const normHeaders = headers.map(h => normalizeText(h));
      for (const variant of variants) {
        const idx = normHeaders.findIndex(h => h === normalizeText(variant));
        if (idx !== -1) return idx;
      }
      return -1;
    }

    function csvUrlBySheetName(sheetName) {
      return `https://docs.google.com/spreadsheets/d/${CONFIG.SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
    }

    let vuzEntries = [];
    let vuzLoaded = false;

    async function loadVuzSheet() {
      if (vuzLoaded) return;
      try {
        const response = await fetch(csvUrlBySheetName(CONFIG.KZ_VUZ_SHEET), { method: 'GET', mode: 'cors' });
        if (!response.ok) throw new Error('Не удалось загрузить CSV из Google Sheets');
        const text = await response.text();
        const rows = parseCSV(text).filter(r => r.some(c => String(c || '').trim() !== ''));
        if (!rows.length) {
          vuzEntries = [];
          vuzLoaded = true;
          return;
        }

        const headers = rows[0].map(String);
        const colLabel = findColIndex(headers, ['Название УЗ', 'Название', 'ВУЗ', 'УЗ']);
        const colAlias = findColIndex(headers, ['От пользователя', 'Пользователь', 'Alias', 'Синоним']);
        const colUnified = findColIndex(headers, ['Унифицированное', 'Унифиц.', 'Код', 'ID']);

        const li = colLabel !== -1 ? colLabel : 0;
        const ai = colAlias !== -1 ? colAlias : 1;
        const ui = colUnified !== -1 ? colUnified : 2;

        const map = new Map();
        for (let i = 1; i < rows.length; i++) {
          const row = rows[i];
          const label = String(row[li] ?? '').trim();
          const alias = String(row[ai] ?? '').trim();
          const unified = String(row[ui] ?? '').trim();
          if (!unified) continue;

          if (!map.has(unified)) {
            map.set(unified, { label: label || unified, unified, aliases: new Set() });
          }

          const item = map.get(unified);
          if (label) item.label = label;
          if (label) item.aliases.add(label);
          if (alias) item.aliases.add(alias);
          item.aliases.add(unified);
        }

        vuzEntries = Array.from(map.values()).map(item => ({
          label: item.label,
          unified: item.unified,
          searchBlob: Array.from(item.aliases).map(normalizeText).filter(Boolean).join(' | ')
        })).sort((a, b) => a.label.localeCompare(b.label, 'ru'));

        vuzLoaded = true;
      } catch (error) {
        console.error('Ошибка загрузки списка вузов:', error);
        vuzEntries = [];
        vuzLoaded = true;
      }
    }

    function hideVuzDropdown() {
      vuzDropdown.style.display = 'none';
      vuzDropdown.innerHTML = '';
    }

    function scoreItem(item, qNorm) {
      const label = normalizeText(item.label);
      if (label.startsWith(qNorm)) return 0;
      const idx = item.searchBlob.indexOf(qNorm);
      if (idx === 0) return 1;
      if (idx > 0) return 2;
      return 99;
    }

    function searchVuz(q) {
      const qNorm = normalizeText(q);
      if (qNorm.length < CONFIG.VUZ_MIN_CHARS || !vuzEntries.length) return [];

      const results = [];
      for (const item of vuzEntries) {
        if (item.searchBlob.includes(qNorm)) {
          results.push(item);
          if (results.length >= 250) break;
        }
      }

      results.sort((a, b) => {
        const sa = scoreItem(a, qNorm);
        const sb = scoreItem(b, qNorm);
        if (sa !== sb) return sa - sb;
        return a.label.localeCompare(b.label, 'ru');
      });

      return results.slice(0, CONFIG.VUZ_SUGGEST_LIMIT);
    }

    function showVuzDropdown(items) {
      if (!items.length) {
        hideVuzDropdown();
        return;
      }

      vuzDropdown.innerHTML = '';
      items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'ft-dropdown-item';
        div.textContent = item.label;
        div.addEventListener('click', function (e) {
          e.preventDefault();
          e.stopPropagation();
          vuzInp.value = item.label;
          vuzUnifiedInp.value = item.unified;
          hideVuzDropdown();
        });
        vuzDropdown.appendChild(div);
      });
      vuzDropdown.style.display = 'block';
    }

    function getStartParamRaw() {
      const sp = tg?.initDataUnsafe?.start_param;
      if (sp && String(sp).trim()) return String(sp).trim();

      const url = new URL(location.href);
      const fromQuery =
        url.searchParams.get('startapp') ||
        url.searchParams.get('bot_tag') ||
        url.searchParams.get('tgWebAppStartParam') ||
        url.searchParams.get('start_param') ||
        url.searchParams.get('event') ||
        url.searchParams.get('forum') ||
        url.searchParams.get('start');

      if (fromQuery && String(fromQuery).trim()) return String(fromQuery).trim();

      const hash = (location.hash || '').replace(/^#/, '');
      if (hash) {
        const params = new URLSearchParams(hash);
        const fromHash = params.get('bot_tag');
        if (fromHash && String(fromHash).trim()) return String(fromHash).trim();
      }

      return (localStorage.getItem('bot_tag') || '').trim();
    }

        toggleCustomFacultyField(this.value === 'другое');
        updateStreamFinalValue();
      });

      customFacultyInp.addEventListener('input', updateStreamFinalValue);
      vuzInp.addEventListener('input', function () {
        vuzUnifiedInp.value = '';
      });

      let vuzTimer = null;
      vuzInp.addEventListener('keyup', function () {
        clearTimeout(vuzTimer);
        vuzTimer = setTimeout(function () {
          const q = vuzInp.value || '';
          if (normalizeText(q).length < CONFIG.VUZ_MIN_CHARS) {
            hideVuzDropdown();
            return;
          }
          showVuzDropdown(searchVuz(q));
        }, 80);
      });

      vuzInp.addEventListener('focus', async function () {
        await loadVuzSheet();
        const q = vuzInp.value || '';
        if (normalizeText(q).length >= CONFIG.VUZ_MIN_CHARS) {
          showVuzDropdown(searchVuz(q));
        }
      });

      document.addEventListener('click', function (e) {
        if (!vuzDropdown.contains(e.target) && e.target !== vuzInp) hideVuzDropdown();
      });

      vuzDropdown.addEventListener('click', function (e) {
        e.stopPropagation();
      });

      closeSuccessBtn.addEventListener('click', closeSuccess);
    }

    form.addEventListener('submit', async function (e) {
      e.preventDefault();

      setError(errEmail, '');
      setError(errPhone, '');
      setError(errConsent, '');
      setError(errCustomFaculty, '');
      showFormMessage('');

      const email = (emailInp.value || '').trim();
      const phone = normalizePhone(phoneInp.value || '');
      phoneInp.value = phone;

      let isValid = true;
      if (!isValidEmail(email)) {
        setError(errEmail, 'Проверьте корректность email.');
        isValid = false;
      }
      if (!isValidPhone(phone)) {
        setError(errPhone, 'Телефон должен быть в формате +77017777777.');
        isValid = false;
      }
      if (streamSel.value === 'другое' && !(customFacultyInp.value || '').trim()) {
        setError(errCustomFaculty, 'Пожалуйста, укажите свой факультет.');
        isValid = false;
      }
      if (!consentChk.checked) {
        setError(errConsent, 'Нужно согласие, чтобы продолжить.');
        isValid = false;
      }

      if (!isValid) return;

      submitBtn.disabled = true;
      const originalText = submitBtn.textContent;
      submitBtn.textContent = 'Отправляем...';

      try {
        const vuzTyped = (vuzInp.value || '').trim();
        const vuzUnified = (vuzUnifiedInp.value || '').trim();
        const botTag = getStartParamRaw();
        if (botTag) localStorage.setItem('bot_tag', botTag);

        const payload = {
          firstname: (firstnameInp.value || '').trim(),
          email,
          mobteleph: phone,
          vuz: vuzTyped || null,
          vuz_title: vuzTyped || null,
          vuz_unified: vuzUnified || null,
          careerday: CONFIG.FORUM_FIXED,
          landing_type: landingTypeInp.value || 'kzkf_tg',
          year_of_grad: yearSel.value || null,
          age: null,
          stream: streamFinalInp.value || streamSel.value || null,
          consent: true,
          form_source: 'telegram_webapp',
          page_url: location.href,
          ts: new Date().toISOString(),
          bot_tag: botTag || ''
        };

        const url = new URL(location.href);
        payload.utm_source = url.searchParams.get('utm_source') || '';
        payload.utm_medium = url.searchParams.get('utm_medium') || '';
        payload.utm_campaign = url.searchParams.get('utm_campaign') || '';
        payload.utm_content = url.searchParams.get('utm_content') || '';
        payload.utm_term = url.searchParams.get('utm_term') || '';

        if (tg) {
          payload.tg_init_data = tg.initData || '';
          payload.tg_user_id = tg.initDataUnsafe?.user?.id || null;
          payload.tg_username = tg.initDataUnsafe?.user?.username || null;
          payload.tg_first_name = tg.initDataUnsafe?.user?.first_name || null;
          payload.tg_last_name = tg.initDataUnsafe?.user?.last_name || null;
          payload.tg_language_code = tg.initDataUnsafe?.user?.language_code || null;
          payload.tg_platform = tg.platform || null;
          payload.tg_start_param = tg.initDataUnsafe?.start_param || null;
        }

        const response = await fetch(CONFIG.API_BASE, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(data.message || 'Ошибка отправки формы');
        }

        showSuccessMessage();
      } catch (error) {
        console.error('Ошибка отправки формы:', error);
        showFormMessage('Не получилось отправить форму. Попробуйте ещё раз чуть позже.');
        tg?.HapticFeedback?.notificationOccurred?.('error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = originalText;
      }
    });

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
  </script>
</body>
</html>
